baseURL = "https://ceeyang.com/"
title = "Cee Yang"
languageCode = "zh-cn"
theme = "PaperMod"
paginate = 10

enableRobotsTXT = true
enableEmoji = true
pygmentsUseClasses = true

[params]
  env = "production"
  title = "Cee Yang — AI 产品 · 全栈开发 · 一人公司"
  description = "Cee Yang 的个人技术博客，专注 AI 产品开发、Flutter/Dart、全栈工程实践与一人公司经验分享。"
  keywords = ["AI开发", "全栈开发", "Flutter", "Dart", "一人公司", "独立开发者", "技术博客"]
  author = "Cee Yang"
  defaultTheme = "auto"
  DateFormat = "2006-01-02"
  canonicalURL = "https://ceeyang.com"

  # 默认 Open Graph 分享封面图
  images = ["images/og-cover.png"]

  ShowReadingTime = true
  ShowWordCount = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  ShowShareButtons = true
  ShowFullTextinRSS = true

  # Profile Mode 关闭 — 改用 homeInfoParams（上方简介 + 下方文章列表）
  [params.profileMode]
    enabled = false

  # 首页简介栏
  [params.homeInfoParams]
    Title = "你的AI产品合伙人 👋"
    Content = "专注 AI 开发、Flutter/Dart 全栈实践与一人公司经验分享"

  # 社交链接
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/ceeyang"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/ceeyang_crypto"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10

  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 20

  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 30

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 40

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 50

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
  [markup.highlight]
    noClasses = false

[outputs]
  home = ["HTML", "RSS", "JSON"]
